name: CI

# F-0.9: ruff + mypy + pytest (Python) + eslint + tsc + vitest (TS) + cross-cutting
# enforcement (banned terms, inline hex). Target <5 min on a no-op PR.
# Detail: docs/14-Engineering.md §6, docs/Implementation Tracker.md F-0.9.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine — ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: engine

    # Service containers mirror docker-compose.yml so test_postgres.py and
    # test_redis.py exercise the real stores. Without these, the DB tests
    # hit ECONNREFUSED on the runner (Phase 2 E-2.2 brought them in).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: modpilot
          POSTGRES_PASSWORD: modpilot
          POSTGRES_DB: modpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U modpilot"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.27"
          enable-cache: true

      - name: Sync deps
        run: uv sync --extra dev --frozen || uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy strict
        run: uv run mypy --strict api observability store llm

      - name: Migrate schema (Alembic)
        env:
          DATABASE_URL: postgresql+asyncpg://modpilot:modpilot@localhost:5432/modpilot
        run: uv run alembic upgrade head

      - name: Pytest (live LLM tests skipped — ENABLE_LIVE_LLM_TESTS unset)
        env:
          ENV: development
          DATABASE_URL: postgresql+asyncpg://modpilot:modpilot@localhost:5432/modpilot
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest -q

  devvit:
    name: Devvit — eslint + tsc + build
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: devvit-app
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: devvit-app/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript build
        run: npm run type-check

      - name: Vite build
        run: npm run build

  enforce:
    name: Enforce — banned terms + inline hex
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Banned terminology (docs/Glossary.md §1)
        run: ./scripts/check-banned-terms.sh
      - name: Inline hex literals (docs/09-UX.md §15.9)
        run: ./scripts/check-no-inline-hex.sh
